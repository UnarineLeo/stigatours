# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merges
on:
  push:
    branches:
      - main
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - name: Validate Firebase secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STIGATOURS }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Missing GitHub secret FIREBASE_SERVICE_ACCOUNT_STIGATOURS"
            exit 1
          fi
      - name: Validate Firebase service account project and identity
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STIGATOURS }}
        run: |
          node -e "
          const sa = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT || '{}');
          if (!sa.project_id || sa.project_id !== 'stigatours') {
            console.error('::error::Service account project_id must be stigatours. Found: ' + (sa.project_id || '<missing>'));
            process.exit(1);
          }
          if (!sa.client_email) {
            console.error('::error::Service account client_email is missing.');
            process.exit(1);
          }
          console.log('Using service account: ' + sa.client_email);
          "
      - run: npm ci && npm run build
      - name: Write Firebase service account file
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STIGATOURS }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > firebase-service-account.json
      - name: Deploy Firestore rules and indexes
        run: npx firebase-tools deploy --only firestore:rules,firestore:indexes --project stigatours
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STIGATOURS }}
          channelId: live
          projectId: stigatours
      - name: Clean up credentials file
        if: always()
        run: rm -f firebase-service-account.json
